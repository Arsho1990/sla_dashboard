<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SLA Dashboard</title>
  <style>
    /* CSS Variables for Theming */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --header-bg: #1a1a1a;
      --header-text: #ffffff;
      --accent-color: #4B0082;
      --accent-light: #EDE7F6;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    html.dark-mode {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2d2d2d;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --border-color: #444444;
      --accent-light: #3d2d5c;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .header {
      background-color: var(--header-bg);
      color: var(--header-text);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      height: 40px;
      max-width: 150px;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
      color: #BB86FC;
    }

    .theme-toggle {
      background: none;
      border: 1px solid #555;
      color: #B0B0B0;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 18px;
      transition: all 0.3s ease;
      width: 40px;
      height: 40px;
    }

    .theme-toggle:hover {
      background-color: rgba(187, 134, 252, 0.1);
      color: #BB86FC;
      border-color: #BB86FC;
    }

    .forgot-wrapper {
      min-height: calc(100vh - 70px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      background-color: var(--bg-secondary);
    }

    .forgot-container {
      background-color: var(--bg-primary);
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border-left: 6px solid var(--accent-color);
      width: 100%;
      max-width: 500px;
    }

    .forgot-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .forgot-header h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 10px;
    }

    .forgot-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--border-color);
      border-radius: 6px;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
    }

    .error-message {
      background-color: #ffebee;
      color: #c62828;
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-weight: 600;
      border-left: 4px solid #d32f2f;
    }

    .success-message {
      background-color: #e8f5e9;
      color: #2e7d32;
      padding: 12px 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-weight: 600;
      border-left: 4px solid #4caf50;
    }

    .reset-btn {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 15px;
    }

    .reset-btn:hover {
      background-color: #6A0C9F;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(75, 0, 130, 0.3);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: var(--accent-color);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      text-decoration: underline;
      color: #6A0C9F;
    }

    @media (max-width: 768px) {
      .forgot-container {
        padding: 30px 25px;
      }

      .forgot-header h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="{{ url_for('static', filename='avanza-logo.png') }}" alt="Logo" class="logo">
      <div class="header-title">SLA Dashboard</div>
    </div>
    <div>
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="forgot-wrapper">
    <div class="forgot-container">
      <div class="forgot-header">
        <h2>Reset Password</h2>
        <p>Change your password to regain access</p>
      </div>

      {% if error %}
        <div class="error-message">{{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="success-message">{{ success }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label for="username">👤 Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>

        <div class="form-group">
          <label for="old_password">🔐 Old Password</label>
          <input type="password" id="old_password" name="old_password" placeholder="Enter your old password" required>
        </div>

        <div class="form-group">
          <label for="new_password">🔑 New Password</label>
          <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
          <label for="confirm_password">✓ Confirm New Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required>
        </div>

        <button type="submit" class="reset-btn">🔄 Change Password</button>
      </form>

      <div class="back-link">
        <a href="{{ url_for('login') }}">← Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDarkMode = html.classList.toggle('dark-mode');
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const btn = document.querySelector('.theme-toggle');
      const isDark = document.documentElement.classList.contains('dark-mode');
      btn.textContent = isDark ? '☀️' : '🌙';
    }

    window.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
      updateThemeIcon();
    });
  </script>
</body>
</html>
